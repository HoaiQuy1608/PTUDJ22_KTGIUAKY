<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Admin Dashboard</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4" th:text="${course.id == null ? 'Thêm học phần mới' : 'Cập nhật học phần'}"></h3>

                    <form th:action="@{/admin/courses/save}" th:object="${course}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên học phần <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Số tín chỉ <span class="text-danger">*</span></label>
                            <input type="number" th:field="*{credits}" class="form-control" required min="1" max="10" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Giảng viên <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{lecturer}" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Link hình ảnh</label>
                            <input type="url" th:field="*{image}" class="form-control" placeholder="Nhập link ảnh (VD: https://...)" />
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Danh mục <span class="text-danger">*</span></label>
                            <select th:field="*{category.id}" class="form-select" required>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"></option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/admin/courses}" class="btn btn-secondary px-4">Quay lại</a>
                            <button type="submit" class="btn btn-primary px-5">Lưu dữ liệu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
