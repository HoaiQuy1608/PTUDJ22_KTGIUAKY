<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý học phần - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Admin Dashboard - Quản lý học phần</span>
        <div class="d-flex">
            <a th:href="@{/}" class="btn btn-outline-light">Về trang chủ</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="card-title m-0">Danh sách học phần</h3>
                <a th:href="@{/admin/courses/new}" class="btn btn-success">
                    + Thêm học phần mới
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tên học phần</th>
                        <th>Số tín chỉ</th>
                        <th>Giảng viên</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.id}"></td>
                        <td th:text="${course.name}" class="text-start fw-semibold"></td>
                        <td th:text="${course.credits}"></td>
                        <td th:text="${course.lecturer}" class="text-start"></td>
                        <td>
                            <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-sm btn-primary px-3">Sửa</a>
                            <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}"
                               class="btn btn-sm btn-danger px-3"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa học phần này?')">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="5" class="text-center text-muted py-4">Chưa có dữ liệu học phần nào.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
